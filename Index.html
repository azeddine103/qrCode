<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #00c8ff;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --error: #ff4466;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 640px;
      padding: 32px 24px 16px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 3px;
    }

    .logo-icon span {
      background: var(--accent);
      border-radius: 2px;
    }
    .logo-icon span:nth-child(2),
    .logo-icon span:nth-child(4),
    .logo-icon span:nth-child(6),
    .logo-icon span:nth-child(8) {
      background: transparent;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo h1 span {
      color: var(--accent);
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    main {
      width: 100%;
      max-width: 640px;
      padding: 16px 24px 40px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Scanner viewport */
    .scanner-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas { display: none; }

    .scanner-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 48px;
      height: 48px;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--accent);
      border-radius: 2px;
    }
    .corner::before { width: 100%; height: 3px; }
    .corner::after  { width: 3px; height: 100%; }

    .corner.tl { top: 20px; left: 20px; }
    .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

    /* Scan line */
    .scan-line {
      position: absolute;
      left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 12px var(--accent);
      animation: scan 2.4s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes scan {
      0%   { top: 20px;  opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 22px); opacity: 0; }
    }

    .scanner-inactive-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    }

    .scanner-inactive-msg svg {
      opacity: 0.3;
    }

    /* Status badge */
    .status-badge {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      white-space: nowrap;
      transition: all 0.3s;
    }

    .status-badge.scanning {
      border-color: var(--accent);
      color: var(--accent);
    }

    .status-badge.found {
      border-color: var(--accent2);
      color: var(--accent2);
      animation: pulse-badge 0.5s ease;
    }

    @keyframes pulse-badge {
      0%   { transform: translateX(-50%) scale(1); }
      50%  { transform: translateX(-50%) scale(1.1); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.3px;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,255,136,0.05);
    }

    .btn.primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .btn.primary:hover {
      background: #00ffaa;
      color: #000;
    }

    .btn.danger {
      border-color: var(--error);
      color: var(--error);
    }

    .btn.danger:hover {
      background: rgba(255,68,102,0.08);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Results */
    .results-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: slide-in 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }

    .result-card.url::before { background: var(--accent2); }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .result-type {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,255,136,0.1);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .result-type.url { color: var(--accent2); background: rgba(0,200,255,0.1); }

    .result-time {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .result-text {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      word-break: break-all;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .result-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .result-btn.open:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 100px;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Camera selector */
    .cam-select {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .cam-select:hover, .cam-select:focus {
      border-color: var(--accent);
    }

    .error-msg {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--error);
      background: rgba(255,68,102,0.08);
      border: 1px solid rgba(255,68,102,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div>
      <h1>QR<span>scan</span></h1>
      <p class="tagline">Serverless · Lokal · Privat</p>
    </div>
  </div>
</header>

<main>

  <!-- Camera selector -->
  <select class="cam-select" id="camSelect">
    <option value="">📷 Kamera wird geladen…</option>
  </select>

  <div id="errorMsg" class="error-msg" style="display:none;"></div>

  <!-- Scanner viewport -->
  <div class="scanner-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="scanner-overlay">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>

    <div class="scanner-inactive-msg" id="inactiveMsg">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="4" width="22" height="22" rx="3" stroke="#5a5a7a" stroke-width="2"/>
        <rect x="9" y="9" width="12" height="12" rx="1" fill="#5a5a7a"/>
        <rect x="38" y="4" width="22" height="22" rx="3" stroke="#5a5a7a" stroke-width="2"/>
        <rect x="43" y="9" width="12" height="12" rx="1" fill="#5a5a7a"/>
        <rect x="4" y="38" width="22" height="22" rx="3" stroke="#5a5a7a" stroke-width="2"/>
        <rect x="9" y="43" width="12" height="12" rx="1" fill="#5a5a7a"/>
        <rect x="38" y="38" width="6" height="6" fill="#5a5a7a"/>
        <rect x="50" y="38" width="10" height="6" fill="#5a5a7a"/>
        <rect x="38" y="50" width="10" height="6" fill="#5a5a7a"/>
        <rect x="54" y="50" width="6" height="6" fill="#5a5a7a" rx="1"/>
      </svg>
      Kamera starten
    </div>

    <div class="status-badge" id="statusBadge">bereit</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn primary" id="startBtn" onclick="startScanner()">▶ Scannen starten</button>
    <button class="btn danger" id="stopBtn" onclick="stopScanner()" disabled>■ Stopp</button>
  </div>

  <!-- Results -->
  <div class="results-section">
    <div class="section-label">Scan-Ergebnisse</div>
    <div id="resultsList">
      <div class="empty-state">Noch keine QR-Codes gescannt</div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  let stream = null;
  let scanning = false;
  let animFrame = null;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const results = [];
  let lastCode = null;
  let lastTime = 0;

  // Populate cameras — called AFTER we already have a live stream (permission granted)
  async function loadCameras(activeStream) {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById('camSelect');
    sel.innerHTML = '';
    if (cams.length === 0) {
      sel.innerHTML = '<option>Keine Kamera gefunden</option>';
      return;
    }
    // Find which deviceId is currently active
    const activeId = activeStream.getVideoTracks()[0]?.getSettings()?.deviceId;
    cams.forEach((cam, i) => {
      const opt = document.createElement('option');
      opt.value = cam.deviceId;
      opt.textContent = cam.label || `Kamera ${i + 1}`;
      if (cam.deviceId === activeId) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  async function startScanner() {
    hideError();
    const sel = document.getElementById('camSelect');
    const deviceId = sel.value;

    // Constraints: prefer environment (back) camera; use specific deviceId if already chosen
    const constraints = {
      video: deviceId
        ? { deviceId: { exact: deviceId } }
        : { facingMode: { ideal: 'environment' } }
    };

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      await video.play();

      // Populate camera list now that we have permission
      await loadCameras(stream);

      scanning = true;
      document.getElementById('inactiveMsg').style.display = 'none';
      document.getElementById('scanLine').style.opacity = '1';
      setStatus('scanning', 'Scannen…');
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      tick();
    } catch (e) {
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        showError('Kamerazugriff verweigert. Bitte erlaube den Zugriff in deinen Browser-Einstellungen und lade die Seite neu.');
      } else if (e.name === 'NotFoundError') {
        showError('Keine Kamera gefunden. Bitte schließe eine Kamera an.');
      } else {
        showError('Kamera konnte nicht gestartet werden: ' + e.message);
      }
    }
  }

  function stopScanner() {
    scanning = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    if (stream) stream.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    document.getElementById('inactiveMsg').style.display = 'flex';
    document.getElementById('scanLine').style.opacity = '0';
    setStatus('', 'bereit');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    lastCode = null;
  }

  function tick() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      if (code) {
        const now = Date.now();
        if (code.data !== lastCode || now - lastTime > 3000) {
          lastCode = code.data;
          lastTime = now;
          onCodeFound(code.data);
        }
      }
    }
    animFrame = requestAnimationFrame(tick);
  }

  function onCodeFound(text) {
    setStatus('found', 'Erkannt!');
    setTimeout(() => scanning && setStatus('scanning', 'Scannen…'), 1200);

    const isURL = /^https?:\/\//i.test(text) || /^www\./i.test(text);
    const entry = { text, isURL, time: new Date() };
    results.unshift(entry);
    renderResults();
    showToast('✓ QR-Code erkannt');

    // Flash effect
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:rgba(0,255,136,0.15);pointer-events:none;z-index:10;animation:fade-flash 0.5s ease forwards;';
    document.querySelector('.scanner-wrapper').appendChild(overlay);
    setTimeout(() => overlay.remove(), 600);
  }

  function renderResults() {
    const list = document.getElementById('resultsList');
    if (results.length === 0) {
      list.innerHTML = '<div class="empty-state">Noch keine QR-Codes gescannt</div>';
      return;
    }
    list.innerHTML = results.map((r, i) => {
      const typeLabel = r.isURL ? 'URL' : 'Text';
      const typeClass = r.isURL ? 'url' : '';
      const t = r.time;
      const ts = `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}`;
      return `
        <div class="result-card ${typeClass}">
          <div class="result-meta">
            <span class="result-type ${typeClass}">${typeLabel}</span>
            <span class="result-time">${ts}</span>
          </div>
          <div class="result-text">${escHtml(r.text)}</div>
          <div class="result-actions">
            <button class="result-btn" onclick="copyText(${i})">⎘ Kopieren</button>
            ${r.isURL ? `<button class="result-btn open" onclick="openURL(${i})">↗ Öffnen</button>` : ''}
            <button class="result-btn" onclick="deleteEntry(${i})">✕ Löschen</button>
          </div>
        </div>`;
    }).join('');
  }

  function copyText(i) {
    navigator.clipboard.writeText(results[i].text).then(() => showToast('Kopiert!'));
  }

  function openURL(i) {
    let url = results[i].text;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    window.open(url, '_blank', 'noopener,noreferrer');
  }

  function deleteEntry(i) {
    results.splice(i, 1);
    renderResults();
  }

  function setStatus(cls, text) {
    const badge = document.getElementById('statusBadge');
    badge.className = 'status-badge ' + cls;
    badge.textContent = text;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Add flash keyframe dynamically
  const style = document.createElement('style');
  style.textContent = '@keyframes fade-flash { from { opacity:1 } to { opacity:0 } }';
  document.head.appendChild(style);

  // Camera list is populated after the first permission grant in startScanner()
  document.getElementById('camSelect').innerHTML = '<option value="">📷 Kamera auswählen…</option>';
</script>
</body>
</html>
