<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRscan</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00ff88" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QRscan" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --border:  #1e1e2e;
      --accent:  #00ff88;
      --accent2: #00c8ff;
      --text:    #e8e8f0;
      --muted:   #5a5a7a;
      --error:   #ff4466;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    header {
      width: 100%; max-width: 640px;
      padding: 32px 24px 16px;
      position: relative; z-index: 1;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 36px; height: 36px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 3px;
    }
    .logo-icon span { background: var(--accent); border-radius: 2px; }
    .logo-icon span:nth-child(2),
    .logo-icon span:nth-child(4),
    .logo-icon span:nth-child(6),
    .logo-icon span:nth-child(8) { background: transparent; }

    .logo h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .logo h1 span { color: var(--accent); }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 11px; color: var(--muted);
      margin-top: 4px; letter-spacing: 1px;
      text-transform: uppercase;
    }

    main {
      width: 100%; max-width: 640px;
      padding: 16px 24px 48px;
      position: relative; z-index: 1;
      display: flex; flex-direction: column; gap: 16px;
    }

    select {
      width: 100%;
      font-family: 'Space Mono', monospace; font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px; border-radius: 10px;
      cursor: pointer; outline: none;
      transition: border-color .2s;
    }
    select:hover, select:focus { border-color: var(--accent); }

    #errorMsg {
      display: none;
      font-family: 'Space Mono', monospace; font-size: 12px;
      color: var(--error);
      background: rgba(255,68,102,.08);
      border: 1px solid rgba(255,68,102,.25);
      border-radius: 10px; padding: 12px 16px; line-height: 1.7;
    }

    .scanner-wrap {
      position: relative; width: 100%; aspect-ratio: 1;
      border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border); background: #000;
    }

    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }

    .corner { position: absolute; width: 44px; height: 44px; pointer-events: none; }
    .corner::before, .corner::after {
      content: ''; position: absolute;
      background: var(--accent); border-radius: 2px;
    }
    .corner::before { width: 100%; height: 3px; top: 0; left: 0; }
    .corner::after  { width: 3px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 16px; left: 16px; }
    .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }

    #scanLine {
      position: absolute; left: 16px; right: 16px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 10px var(--accent);
      display: none;
      animation: scan 2.4s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { top: 16px; }
      100% { top: calc(100% - 18px); }
    }

    #idleMsg {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: var(--muted);
      font-family: 'Space Mono', monospace; font-size: 13px;
    }

    #badge {
      position: absolute; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 16px; border-radius: 100px;
      background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      white-space: nowrap; transition: all .25s;
    }
    #badge.scanning { border-color: var(--accent);  color: var(--accent); }
    #badge.found    { border-color: var(--accent2); color: var(--accent2); }

    #flash {
      position: absolute; inset: 0;
      background: rgba(0,255,136,.2);
      pointer-events: none; opacity: 0;
      transition: opacity .05s;
    }
    #flash.show { opacity: 1; }

    .controls { display: flex; gap: 12px; }

    .btn {
      flex: 1; padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover:not(:disabled) {
      border-color: var(--accent); color: var(--accent);
      background: rgba(0,255,136,.05);
    }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn.primary:hover:not(:disabled) { background: #00ffaa; color: #000; }
    .btn.stop { border-color: var(--error); color: var(--error); }
    .btn.stop:hover:not(:disabled) { background: rgba(255,68,102,.08); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .section-label {
      font-family: 'Space Mono', monospace; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    #resultsList { display: flex; flex-direction: column; gap: 10px; }

    .empty {
      padding: 24px; text-align: center;
      color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px;
      border: 1px dashed var(--border); border-radius: 12px;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
      animation: slideIn .25s ease;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent);
    }
    .card.url::before { background: var(--accent2); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta { display: flex; align-items: center; justify-content: space-between; }

    .type-badge {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(0,255,136,.1); color: var(--accent);
    }
    .type-badge.url { background: rgba(0,200,255,.1); color: var(--accent2); }

    .card-time { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
    .card-text { font-size: 14px; line-height: 1.55; color: var(--text); word-break: break-all; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .action-btn {
      font-family: 'Space Mono', monospace; font-size: 11px;
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.open:hover { border-color: var(--accent2); color: var(--accent2); }

    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface); border: 1px solid var(--accent);
      color: var(--accent); font-family: 'Space Mono', monospace;
      font-size: 12px; padding: 9px 20px; border-radius: 100px;
      z-index: 999; transition: transform .3s ease;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div>
      <h1>QR<span>scan</span></h1>
      <p class="tagline">Serverless · Lokal · Privat</p>
    </div>
  </div>
</header>

<main>
  <select id="camSelect"><option value="">📷 Kamera auswählen…</option></select>
  <div id="errorMsg"></div>

  <div class="scanner-wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scanLine"></div>
    <div id="flash"></div>
    <div id="idleMsg">
      <svg width="56" height="56" viewBox="0 0 64 64" fill="none" opacity="0.35">
        <rect x="4"  y="4"  width="22" height="22" rx="3" stroke="#e8e8f0" stroke-width="2"/>
        <rect x="9"  y="9"  width="12" height="12" rx="1" fill="#e8e8f0"/>
        <rect x="38" y="4"  width="22" height="22" rx="3" stroke="#e8e8f0" stroke-width="2"/>
        <rect x="43" y="9"  width="12" height="12" rx="1" fill="#e8e8f0"/>
        <rect x="4"  y="38" width="22" height="22" rx="3" stroke="#e8e8f0" stroke-width="2"/>
        <rect x="9"  y="43" width="12" height="12" rx="1" fill="#e8e8f0"/>
        <rect x="38" y="38" width="6"  height="6"  fill="#e8e8f0"/>
        <rect x="50" y="38" width="10" height="6"  fill="#e8e8f0"/>
        <rect x="38" y="50" width="10" height="6"  fill="#e8e8f0"/>
        <rect x="54" y="50" width="6"  height="6"  rx="1" fill="#e8e8f0"/>
      </svg>
      Kamera starten
    </div>
    <div id="badge">Bereit</div>
  </div>

  <div class="controls">
    <button class="btn primary" id="startBtn" onclick="startScanner()">▶ Scannen starten</button>
    <button class="btn stop"    id="stopBtn"  onclick="stopScanner()" disabled>■ Stopp</button>
  </div>

  <div class="section-label">Scan-Ergebnisse</div>
  <div id="resultsList">
    <div class="empty">Noch keine QR-Codes gescannt</div>
  </div>
</main>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────
  let stream   = null;
  let scanning = false;
  let rafId    = null;
  let detector = null;   // native BarcodeDetector, if available
  let lastCode = null;
  let lastTime = 0;
  const results = [];

  // ── Elements ───────────────────────────────────────────────────
  const video     = document.getElementById('video');
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d', { willReadFrequently: true });
  const camSelect = document.getElementById('camSelect');
  const errorMsg  = document.getElementById('errorMsg');
  const idleMsg   = document.getElementById('idleMsg');
  const scanLine  = document.getElementById('scanLine');
  const flash     = document.getElementById('flash');
  const badge     = document.getElementById('badge');
  const startBtn  = document.getElementById('startBtn');
  const stopBtn   = document.getElementById('stopBtn');
  const toast     = document.getElementById('toast');

  // ── Load jsQR from CDN (fallback) ──────────────────────────────
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  // ── Init QR engine ─────────────────────────────────────────────
  async function initEngine() {
    // 1. Try native BarcodeDetector (works on Chrome/Android without internet)
    if ('BarcodeDetector' in window) {
      try {
        const formats = await BarcodeDetector.getSupportedFormats();
        if (formats.includes('qr_code')) {
          detector = new BarcodeDetector({ formats: ['qr_code'] });
          return; // success
        }
      } catch (_) {}
    }

    // 2. Fallback: load jsQR from CDN
    try {
      await loadScript('https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js');
      return;
    } catch (_) {}

    // 3. Second CDN fallback
    try {
      await loadScript('https://unpkg.com/jsqr@1.4.0/dist/jsQR.js');
      return;
    } catch (_) {}

    throw new Error('QR-Bibliothek konnte nicht geladen werden. Bitte Internetverbindung prüfen und Seite neu laden.');
  }

  // ── Decode one frame ───────────────────────────────────────────
  async function decodeFrame() {
    if (detector) {
      // Native path — fast, no canvas needed
      try {
        const codes = await detector.detect(video);
        return codes.length ? codes[0].rawValue : null;
      } catch (_) { return null; }
    }

    // jsQR path
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return null;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    return code ? code.data : null;
  }

  // ── Scan loop ──────────────────────────────────────────────────
  async function tick() {
    if (!scanning) return;
    try {
      const value = await decodeFrame();
      if (value) {
        const now = Date.now();
        if (value !== lastCode || now - lastTime > 3000) {
          lastCode = value;
          lastTime = now;
          onFound(value);
        }
      }
    } catch (_) {}
    rafId = requestAnimationFrame(tick);
  }

  // ── Start ──────────────────────────────────────────────────────
  async function startScanner() {
    hideError();
    startBtn.disabled = true;
    setBadge('', 'Wird geladen…');

    try {
      await initEngine();
    } catch (e) {
      showError(e.message);
      startBtn.disabled = false;
      setBadge('', 'Bereit');
      return;
    }

    const deviceId = camSelect.value;
    const constraints = {
      video: deviceId
        ? { deviceId: { exact: deviceId } }
        : { facingMode: { ideal: 'environment' } }
    };

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      await video.play();
      await populateCameras();

      scanning = true;
      idleMsg.style.display  = 'none';
      scanLine.style.display = 'block';
      stopBtn.disabled       = false;
      setBadge('scanning', 'Scannen…');
      tick();

    } catch (e) {
      startBtn.disabled = false;
      setBadge('', 'Bereit');
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        showError('Kamerazugriff verweigert.<br>Bitte in den Browser-Einstellungen erlauben und Seite neu laden.');
      } else if (e.name === 'NotFoundError') {
        showError('Keine Kamera gefunden.');
      } else if (e.name === 'NotReadableError') {
        showError('Kamera wird bereits von einer anderen App verwendet.');
      } else {
        showError('Fehler: ' + e.message);
      }
    }
  }

  // ── Stop ───────────────────────────────────────────────────────
  function stopScanner() {
    scanning = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject        = null;
    idleMsg.style.display  = 'flex';
    scanLine.style.display = 'none';
    startBtn.disabled      = false;
    stopBtn.disabled       = true;
    lastCode               = null;
    setBadge('', 'Bereit');
  }

  // ── Found ──────────────────────────────────────────────────────
  function onFound(text) {
    setBadge('found', 'Erkannt!');
    setTimeout(() => { if (scanning) setBadge('scanning', 'Scannen…'); }, 1200);
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 300);
    const isURL = /^https?:\/\//i.test(text) || /^www\./i.test(text);
    results.unshift({ text, isURL, time: new Date() });
    renderResults();
    showToast('✓ QR-Code erkannt');
  }

  // ── Camera list ────────────────────────────────────────────────
  async function populateCameras() {
    try {
      const devices  = await navigator.mediaDevices.enumerateDevices();
      const cams     = devices.filter(d => d.kind === 'videoinput');
      const activeId = stream?.getVideoTracks()[0]?.getSettings()?.deviceId;
      camSelect.innerHTML = '';
      cams.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || `Kamera ${i + 1}`;
        if (cam.deviceId === activeId) opt.selected = true;
        camSelect.appendChild(opt);
      });
    } catch (_) {}
  }

  camSelect.addEventListener('change', () => {
    if (scanning) { stopScanner(); startScanner(); }
  });

  // ── Render results ─────────────────────────────────────────────
  function renderResults() {
    const list = document.getElementById('resultsList');
    if (!results.length) {
      list.innerHTML = '<div class="empty">Noch keine QR-Codes gescannt</div>';
      return;
    }
    list.innerHTML = results.map((r, i) => {
      const t  = r.time;
      const ts = `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
      return `
        <div class="card ${r.isURL ? 'url' : ''}">
          <div class="card-meta">
            <span class="type-badge ${r.isURL ? 'url' : ''}">${r.isURL ? 'URL' : 'Text'}</span>
            <span class="card-time">${ts}</span>
          </div>
          <div class="card-text">${esc(r.text)}</div>
          <div class="card-actions">
            <button class="action-btn" onclick="copyEntry(${i})">⎘ Kopieren</button>
            ${r.isURL ? `<button class="action-btn open" onclick="openEntry(${i})">↗ Öffnen</button>` : ''}
            <button class="action-btn" onclick="deleteEntry(${i})">✕ Löschen</button>
          </div>
        </div>`;
    }).join('');
  }

  function copyEntry(i) {
    navigator.clipboard.writeText(results[i].text)
      .then(() => showToast('Kopiert!'))
      .catch(() => showToast('Kopieren fehlgeschlagen'));
  }

  function openEntry(i) {
    let url = results[i].text;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    window.open(url, '_blank', 'noopener,noreferrer');
  }

  function deleteEntry(i) {
    results.splice(i, 1);
    renderResults();
  }

  // ── Helpers ────────────────────────────────────────────────────
  function setBadge(cls, text) { badge.className = cls; badge.textContent = text; }
  function showError(html) { errorMsg.innerHTML = html; errorMsg.style.display = 'block'; }
  function hideError() { errorMsg.style.display = 'none'; errorMsg.innerHTML = ''; }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function pad(n) { return String(n).padStart(2, '0'); }

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Service Worker (PWA) ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
